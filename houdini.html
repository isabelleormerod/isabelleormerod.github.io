<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ensuring the header stays visible and on top */
        #header-placeholder {
            position: relative;
            z-index: 1000;
        }

        /* The container becomes the scattered area */
        .projects-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Gives space for images to be 'dropped' */
            padding: 50px;
        }

        /* Each project-square becomes a scattered photo */
        .project-square {
            position: absolute;
            background: white;
            padding: 10px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .project-square img {
            display: block;
            width: 250px; /* Control image size here */
            height: auto;
        }

        /* Hide the text content as requested */
        .project-square h3, 
        .project-square body {
            display: none;
        }

        /* Specific Fixed Positions (These won't change on refresh) */
        .project-square:nth-child(1) { top: 10%; left: 5%;  transform: rotate(-5deg); }
        .project-square:nth-child(2) { top: 25%; left: 55%; transform: rotate(8deg); }
        .project-square:nth-child(3) { top: 50%; left: 15%; transform: rotate(-10deg); }

        /* Hover effect to bring a 'photo' to the top */
        .project-square:hover {
            z-index: 100;
            transform: scale(1.05) rotate(0deg);
        }
    </style>
</head>
<body>

<header id="header-placeholder"></header>

    <main>
        <h1 class="page-title">Houdini</h1>
        
        <div class="projects-container">
            <div class="project-square">
                <img src="assets/images/houdini/IMG_0982.jpeg" alt="Placeholder">
                <h3>Patchwork Jumper</h3>
                <body>For this project, I worked off of the space time pattern, I think it looks really cute</body>
            </div>

            <div class="project-square">
                <img src="assets/images/houdini/IMG_1079.jpeg" alt="Placeholder">
                <h3>Project Title</h3>
            </div>

            <div class="project-square">
                <img src="assets/images/houdini/IMG_1350.jpeg" alt="Placeholder">
                <h3>Project Title</h3>
            </div>
        </div>
    </main>

<script src="js/main.js"></script>
</body>
</html>
